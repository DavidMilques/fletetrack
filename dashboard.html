<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#185FA5">
<title>TRASLADARR3 — Dashboard</title>
<style>
:root{--blue:#185FA5;--blue-l:#E6F1FB;--blue-t:#0C447C;--green:#1D9E75;--green-l:#E1F5EE;--green-t:#085041;--amber:#BA7517;--amber-l:#FAEEDA;--amber-t:#633806;--red:#E24B4A;--red-l:#FCEBEB;--red-t:#791F1F;--gray:#5F5E5A;--gray-l:#F1EFE8;--gray-t:#2C2C2A;--border:#e0ddd6;--bg:#f8f7f4;--r:10px;--rs:6px}
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:var(--bg);color:#1a1a18;min-height:100vh}
.topbar{background:var(--blue);color:white;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:20}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar h1{font-size:16px;font-weight:600}
.topbar-nav{display:flex;gap:2px}
.nav-link{background:rgba(255,255,255,.15);border:none;color:white;padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.nav-link:hover{background:rgba(255,255,255,.25)}
.refresh-btn{background:rgba(255,255,255,.15);border:none;color:white;padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px}
.refresh-btn:hover{background:rgba(255,255,255,.25)}
.last-upd{font-size:11px;opacity:.6}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{animation:spin .7s linear infinite}
.filtros{background:white;border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.fg{display:flex;align-items:center;gap:6px}
.fg label{font-size:11px;font-weight:600;color:var(--gray);white-space:nowrap}
.fg input,.fg select{font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--rs);background:white;color:#1a1a18;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--blue)}
.fsep{width:1px;height:24px;background:var(--border)}
.freset{font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:4px}
.freset:hover{background:var(--blue-l)}
.layout{display:flex;height:calc(100vh - 52px - 45px)}
.sidebar{width:260px;background:white;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-hdr span{font-size:12px;font-weight:600;color:var(--gray-t)}
.sidebar-body{overflow-y:auto;flex:1}
.main{flex:1;overflow-y:auto;padding:14px 18px}
.d-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.d-item:hover{background:var(--bg)}.d-item.sel{background:var(--blue-l);border-left:3px solid var(--blue)}.d-item.warn{border-left:3px solid var(--amber)}
.d-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.d-placa{font-size:13px;font-weight:600}
.d-cond{font-size:11px;color:var(--gray);margin-bottom:4px}
.d-prog{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:5px}
.d-prog-fill{height:100%;border-radius:2px;transition:width .4s}
.d-meta{font-size:10px;color:var(--gray);margin-top:3px}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;white-space:nowrap}
.b-cargando{background:#E6F1FB;color:#0C447C}
.b-ruta{background:#FAEEDA;color:#633806}
.b-retorno{background:#EEEDFE;color:#3C3489}
.b-completado{background:var(--green-l);color:var(--green-t)}
.b-novedad{background:var(--red-l);color:var(--red-t)}
.b-reprogramado{background:var(--gray-l);color:var(--gray-t)}
.b-cancelado{background:var(--red-l);color:var(--red-t)}
.b-pend{background:var(--gray-l);color:var(--gray)}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:14px}
.metric{background:white;border:1px solid var(--border);border-radius:var(--r);padding:12px}
.metric-val{font-size:22px;font-weight:600}
.metric-lbl{font-size:10px;color:var(--gray);margin-top:2px}
.card{background:white;border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.card-title{font-size:13px;font-weight:600;color:var(--gray-t);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.info-item{display:flex;flex-direction:column;gap:2px}
.info-lbl{font-size:10px;color:var(--gray)}.info-val{font-size:13px;font-weight:500}
.times-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}
.time-box{background:var(--bg);border-radius:var(--rs);padding:8px;text-align:center;border:1px solid var(--border)}
.time-val{font-size:13px;font-weight:600}.time-lbl{font-size:9px;color:var(--gray);margin-top:1px}
.time-box.hi{background:var(--blue-l);border-color:var(--blue)}.time-box.hi .time-val{color:var(--blue-t)}
.tiendas-table{width:100%;border-collapse:collapse}
.tiendas-table th{font-size:10px;font-weight:600;color:var(--gray);text-align:left;padding:5px 8px;border-bottom:2px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
.tiendas-table td{font-size:11px;padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.tiendas-table tr:last-child td{border-bottom:none}.tiendas-table tr:hover td{background:var(--bg)}
.t-circ{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:var(--gray-l);color:var(--gray-t)}
.t-circ.ok{background:var(--green);color:white}.t-circ.act{background:var(--blue);color:white}
.prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px}
.prog-fill{height:100%;border-radius:2px;background:var(--green)}
.link-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);padding:9px 11px;font-size:11px;color:var(--gray-t);word-break:break-all;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:5px}
.copy-btn{background:var(--blue);color:white;border:none;border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer;flex-shrink:0}
.copy-btn:hover{background:var(--blue-t)}
.nov-alerta{background:var(--amber-l);border:1px solid var(--amber);border-radius:var(--r);padding:12px;margin-bottom:10px}
.nov-alerta-title{font-size:12px;font-weight:600;color:var(--amber-t);margin-bottom:6px}
.nov-item{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(186,117,23,.2)}
.nov-item:last-child{border-bottom:none}
.empty{text-align:center;padding:30px;color:var(--gray);font-size:13px}
.loading{text-align:center;padding:30px;color:var(--gray);font-size:13px}
.spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 8px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a18;color:white;padding:9px 16px;border-radius:20px;font-size:12px;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulse{animation:pulse 1.5s ease-in-out infinite}
@media(max-width:700px){.layout{flex-direction:column}.sidebar{width:100%;max-height:200px}.metrics{grid-template-columns:repeat(2,1fr)}.times-grid{grid-template-columns:repeat(2,1fr)}.info-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzon1eetwwIcNP9gqCzf5nHmYIxodsiKe_s2cja_qbF5FCtBkDVX37ifktDY2NqiHga/exec';
const BASE_URL = 'https://davidmilques.github.io/TRASLADARR3/conductor.html';
const STATS_URL = 'https://davidmilques.github.io/TRASLADARR3/estadisticas.html';
const INFORMES_URL = 'https://davidmilques.github.io/TRASLADARR3/informes.html';
let todos=[], filtrados=[], selIdx=0, selId=null;
let filtroFecha='', filtroEstado='', filtroConductor='', filtroPlaca='';
</script>

<div class="topbar">
  <div class="topbar-left">
    <h1>TRASLADARR3</h1>
    <div class="topbar-nav">
      <a class="nav-link" id="link-stats" href="#">📊 Estadísticas</a>
      <a class="nav-link" id="link-inf" href="#">📋 Informes</a>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="last-upd" id="last-upd"></span>
    <button class="refresh-btn" onclick="cargarTodo()">
      <svg id="ref-icon" width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M13.5 8A5.5 5.5 0 112.5 5M2.5 2v3h3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Actualizar
    </button>
  </div>
</div>

<div class="filtros">
  <div class="fg"><label>Fecha</label><input type="date" id="f-fecha" onchange="aplicarFiltros()"></div>
  <div class="fsep"></div>
  <div class="fg"><label>Estado</label>
    <select id="f-estado" onchange="aplicarFiltros()">
      <option value="">Todos</option>
      <option value="Cargando">Cargando</option>
      <option value="En ruta">En ruta</option>
      <option value="En retorno">En retorno</option>
      <option value="Completado">Completado</option>
      <option value="Novedad">Novedad</option>

    </select>
  </div>
  <div class="fsep"></div>
  <div class="fg"><label>Conductor</label><select id="f-conductor" onchange="aplicarFiltros()"><option value="">Todos</option></select></div>
  <div class="fsep"></div>
  <div class="fg"><label>Placa</label><select id="f-placa" onchange="aplicarFiltros()"><option value="">Todas</option></select></div>
  <button class="freset" onclick="limpiarFiltros()">Limpiar</button>
  <span style="font-size:11px;color:var(--gray);margin-left:auto" id="f-count"></span>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-hdr">
      <span id="sidebar-count">Despachos</span>
      <span id="nov-badge" style="display:none" class="badge b-novedad pulse"></span>
    </div>
    <div class="sidebar-body" id="sidebar-body"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
  </div>
  <div class="main" id="main-content"><div class="loading"><div class="spinner"></div>Cargando despachos...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
document.getElementById('link-stats').href = STATS_URL;
document.getElementById('link-inf').href   = INFORMES_URL;

window.addEventListener('DOMContentLoaded',()=>{
  const hoy=new Date();
  document.getElementById('f-fecha').value=`${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}-${String(hoy.getDate()).padStart(2,'0')}`;
  filtroFecha=fmtFechaApi(document.getElementById('f-fecha').value);
  cargarTodo();
  setInterval(cargarTodo, 60000);
});

function fmtFechaApi(v){if(!v)return'';const[y,m,d]=v.split('-');return`${d}/${m}/${y}`;}

async function cargarTodo(){
  document.getElementById('ref-icon').classList.add('spinning');
  try{
    const r=await fetch(`${API_URL}?action=getDespachos`);
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    todos=d.despachos||[];
  }catch(e){todos=demoData();toast('Modo demo');}
  poblarSelects();aplicarFiltros();
  document.getElementById('last-upd').textContent=`${new Date().toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}`;
  document.getElementById('ref-icon').classList.remove('spinning');
}

function poblarSelects(){
  const sc=document.getElementById('f-conductor');const vC=sc.value;
  const sp=document.getElementById('f-placa');const vP=sp.value;
  const conds=[...new Set(todos.map(d=>d.conductor).filter(Boolean))].sort();
  const placas=[...new Set(todos.map(d=>d.placa).filter(Boolean))].sort();
  sc.innerHTML='<option value="">Todos</option>'+conds.map(c=>`<option value="${c}"${c===vC?' selected':''}>${c}</option>`).join('');
  sp.innerHTML='<option value="">Todas</option>'+placas.map(p=>`<option value="${p}"${p===vP?' selected':''}>${p}</option>`).join('');
}

function aplicarFiltros(){
  filtroFecha=fmtFechaApi(document.getElementById('f-fecha').value);
  filtroEstado=document.getElementById('f-estado').value;
  filtroConductor=document.getElementById('f-conductor').value;
  filtroPlaca=document.getElementById('f-placa').value;
  filtrados=todos.filter(d=>{
    if(filtroFecha&&d.fecha&&d.fecha.trim()!==filtroFecha)return false;
    if(filtroEstado&&d.estadoCargue!==filtroEstado)return false;
    if(filtroConductor&&d.conductor!==filtroConductor)return false;
    if(filtroPlaca&&d.placa!==filtroPlaca)return false;
    return true;
  });
  const txt=filtrados.length===todos.length?`${todos.length} despachos`:`${filtrados.length} de ${todos.length}`;
  document.getElementById('f-count').textContent=txt;
  // Restaurar selección previa por id
  if(selId){
    const prev=filtrados.findIndex(d=>d.id===selId);
    selIdx=prev>=0?prev:0;
  }else{selIdx=0;}
  renderSidebar();
  if(filtrados.length>0)renderDetalle(selIdx);
  else document.getElementById('main-content').innerHTML='<div class="empty">Sin despachos para estos filtros</div>';
}

function limpiarFiltros(){
  ['f-fecha','f-estado','f-conductor','f-placa'].forEach(id=>document.getElementById(id).value='');
  filtroFecha=filtroEstado=filtroConductor=filtroPlaca='';aplicarFiltros();
}

function badgeCls(estado){const m={'Cargando':'b-cargando','En ruta':'b-ruta','En retorno':'b-retorno','Completado':'b-completado','Novedad':'b-novedad'};return m[estado]||'b-pend';}
function progColor(estado){const m={'Completado':'var(--green)','Novedad':'var(--red)','En retorno':'#7F77DD','En ruta':'var(--amber)'};return m[estado]||'var(--blue)';}
function pct(d){if(!d.tiendas.length)return 0;return Math.round(d.tiendas.filter(t=>t.estado==='completado').length/d.tiendas.length*100);}

function renderSidebar(){
  const body=document.getElementById('sidebar-body');
  const novs=filtrados.filter(d=>d.estadoCargue==='Novedad').length;
  document.getElementById('sidebar-count').textContent=`${filtrados.length} despacho${filtrados.length!==1?'s':''}`;
  const nb=document.getElementById('nov-badge');
  if(novs>0){nb.style.display='inline-block';nb.textContent=`${novs} novedad${novs>1?'es':''}`;}else nb.style.display='none';
  if(!filtrados.length){body.innerHTML='<div class="empty">Sin resultados</div>';return;}
  body.innerHTML=filtrados.map((d,i)=>`
    <div class="d-item${d.estadoCargue==='Novedad'?' warn':''}${i===selIdx?' sel':''}" onclick="selDespacho(${i})">
      <div class="d-top"><span class="d-placa">${d.placa}</span><span class="badge ${badgeCls(d.estadoCargue)}">${d.estadoCargue}</span></div>
      <div class="d-cond">${d.conductor} · ${d.turno}</div>
      <div class="d-prog"><div class="d-prog-fill" style="width:${pct(d)}%;background:${progColor(d.estadoCargue)}"></div></div>
      <div class="d-meta">${d.tiendas.filter(t=>t.estado==='completado').length}/${d.tiendas.length} tiendas · ${d.fecha}</div>
    </div>`).join('');
}

function selDespacho(i){selIdx=i;selId=filtrados[i]?filtrados[i].id:null;renderSidebar();renderDetalle(i);}

function renderDetalle(i){
  const d=filtrados[i];
  if(!d){document.getElementById('main-content').innerHTML='<div class="empty">Selecciona un despacho</div>';return;}
  const p=pct(d);
  const pc=progColor(d.estadoCargue);
  const ok=d.tiendas.filter(t=>t.estado==='completado').length;
  const novs=extraerNovedades(d.observaciones);
  const link=`${BASE_URL}?id=${d.id}&row=${d.rowIndex}`;

  // Métricas del filtro actual
  const metHtml=`<div class="metrics">
    <div class="metric"><div class="metric-val" style="color:var(--gray-t)">${filtrados.length}</div><div class="metric-lbl">Despachos</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--amber)">${filtrados.filter(x=>x.estadoCargue==='En ruta').length}</div><div class="metric-lbl">En ruta</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--green)">${filtrados.filter(x=>x.estadoCargue==='Completado').length}</div><div class="metric-lbl">Completados</div></div>
    <div class="metric"><div class="metric-val" style="color:var(--red)">${filtrados.filter(x=>x.estadoCargue==='Novedad').length}</div><div class="metric-lbl">Novedades</div></div>
  </div>`;

  const novHtml=novs.length?`<div class="nov-alerta"><div class="nov-alerta-title">Novedades reportadas</div>${novs.map(n=>`<div class="nov-item"><span style="font-size:11px;font-weight:600;color:var(--amber-t)">${n.tipo}</span><span style="font-size:11px;color:var(--amber-t);opacity:.8">· ${n.desc} · ${n.hora}</span></div>`).join('')}</div>`:'';

  const tiendasHtml=d.tiendas.map(t=>{
    const cls=t.estado==='completado'?'ok':t.estado==='activo'?'act':'';
    const bCls=t.estado==='completado'?'b-completado':t.estado==='activo'?'b-cargando':'b-pend';
    const lbl=t.estado==='completado'?'Entregado':t.estado==='activo'?'En tienda':'Pendiente';
    const est=(d.horasEstimadas||[]).find(e=>e.numero===t.numero);
    return`<tr><td><div class="t-circ ${cls}">${t.numero}</div></td>
      <td><div style="font-weight:500">${t.nombre}</div><div style="font-size:10px;color:var(--gray)">${t.descripcion}</div></td>
      <td style="text-align:center;font-weight:600">${t.palletsTienda||'—'}</td>
      <td>${t.horaCita||'—'}</td>
      <td style="font-weight:600;color:var(--blue-t)">${est&&est.horaEstimada?est.horaEstimada:'—'}</td>
      <td>${t.horaLlegada||'—'}</td>
      <td>${t.horaInicioDesc||'—'}</td><td>${t.horaFinDesc||'—'}</td>
      <td>${t.horaSalida||'—'}</td>
      <td><span class="badge ${bCls}">${lbl}</span></td></tr>`;
  }).join('');

  document.getElementById('main-content').innerHTML=metHtml+novHtml+`
    <div class="card">
      <div class="card-title"><span>${d.placa} — ${d.conductor}</span><span class="badge ${badgeCls(d.estadoCargue)}">${d.estadoCargue}</span></div>
      <div class="info-grid">
        <div class="info-item"><span class="info-lbl">Protocolo</span><span class="info-val" style="color:var(--blue)">${d.protocolo}</span></div>
        <div class="info-item"><span class="info-lbl">CEDI</span><span class="info-val">${d.cedi}</span></div>
        <div class="info-item"><span class="info-lbl">Turno</span><span class="info-val">${d.turno}</span></div>
        <div class="info-item"><span class="info-lbl">Carga útil</span><span class="info-val">${d.cargaUtil||'—'}</span></div>
        <div class="info-item"><span class="info-lbl">Kilómetros</span><span class="info-val">${d.kilometros||'—'}</span></div>
        <div class="info-item"><span class="info-lbl">Peajes</span><span class="info-val">${d.peajes||'—'}</span></div>
      </div>
      <div style="margin-top:10px">
        <div class="prog-bar" style="height:6px"><div class="prog-fill" style="width:${p}%;background:${pc}"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--gray);margin-top:3px"><span>${ok} de ${d.tiendas.length} tiendas</span><span>${p}%</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Tiempos clave</div>
      <div class="times-grid">
        <div class="time-box"><div class="time-val">${d.horaOfrecimiento||'—'}</div><div class="time-lbl">Ofrecimiento</div></div>
        <div class="time-box"><div class="time-val">${d.horaEntradaCedi||'—'}</div><div class="time-lbl">Entrada CEDI</div></div>
        <div class="time-box hi"><div class="time-val">${d.horaSalidaCedi||'—'}</div><div class="time-lbl">Salida CEDI</div></div>
        <div class="time-box"><div class="time-val">${d.horaRetornoCedi||'—'}</div><div class="time-lbl">Retorno real</div></div>
      </div>
      ${(()=>{const ret=(d.horasEstimadas||[]).find(e=>e.esRetorno);return ret?`<div style="margin-top:8px;background:var(--blue-l);border-radius:var(--rs);padding:8px 12px;font-size:12px;color:var(--blue-t);display:flex;align-items:center;gap:8px"><span style="font-weight:600">Retorno estimado CEDI:</span><span style="font-size:15px;font-weight:700">${ret.horaEstimada}</span><span style="opacity:.7">(${ret.minTramo} min de viaje)</span></div>`:'';})()}
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div style="padding:12px 14px 6px;font-size:13px;font-weight:600;color:var(--gray-t)">Tiendas del despacho</div>
      <div style="overflow-x:auto">
        <table class="tiendas-table">

function extraerNovedades(obs){
  if(!obs)return[];
  return[...obs.matchAll(/NOVEDAD \[([^\]]+)\]: ([^-]+) - (.+?)(?=\s*\||NOVEDAD|$)/g)].map(m=>({hora:m[1].trim(),tipo:m[2].trim(),desc:m[3].trim()}));
}


function verAviso(id){
  const d=filtrados.find(x=>x.id===id);
  if(!d)return;
  const win=window.open('','_blank','width=680,height=700,scrollbars=yes');
  const est=d.horasEstimadas||[];
  const fecha=d.fecha||'';

    const e=est.find(x=>x.numero===t.numero);
    const color=['#FF6B35','#4CAF50','#9C27B0','#2196F3','#FF9800','#E91E63','#00BCD4','#795548','#607D8B'][i]||'#888';

        <div style="font-size:18px;font-weight:700;color:${color}">${t.palletsTienda||0}</div>
      </td>
    </tr>`;
  }).join('');

  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>Aviso de despacho — ${d.protocolo}</title>
  <style>*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif}body{background:#f5f5f5;padding:20px}

    <div style="display:grid;grid-template-columns:1fr 1fr;border-bottom:2px solid #ccc">
      <div style="padding:12px 16px;border-right:1px solid #ccc">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="background:#888;color:white;padding:5px 10px;font-size:11px;font-weight:600">FECHA</div>
          <div style="font-size:14px;font-weight:600">${fecha}</div>
        </div>

      <div style="padding:12px 16px;display:flex;align-items:center;gap:8px;justify-content:flex-end">

    </div>
    <table style="width:100%;border-collapse:collapse">${rows}</table>
    <div style="padding:10px 16px;text-align:center;font-size:10px;color:#999;border-top:1px solid #eee">FleteTrack · ${d.conductor||''} · Protocolo ${d.protocolo}</div>
  </div>
  </body></html>`);
  win.document.close();
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
